services:
  - type: web
    name: fintrack-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString

databases:
  - name: fintrack-db
    plan: starter
    databaseName: fintrack
    user: fintrack
